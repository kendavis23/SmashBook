name: Deploy web-player

on:
  push:
    branches:
      - frontend
    paths:
      - frontend/apps/web-player/**
      - frontend/packages/player-domain/**
      - frontend/packages/api-client/modules/player/**
      - frontend/packages/api-client/modules/share/**
      - frontend/packages/auth/**
      - frontend/packages/ui/**
      - frontend/packages/design-system/**
      - frontend/packages/config/**
      - frontend/packages/shared/**
      - frontend/packages/testing/**
      - .github/workflows/deploy-frontend-web-player.yml
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  DEPLOY_ENV: ${{ github.event.inputs.deploy_env || 'staging' }}

jobs:
  secrets:
    name: Fetch Secrets from GCP
    runs-on: ubuntu-latest
    outputs:
      api_base_url: ${{ steps.fetch.outputs.api_base_url }}
      bucket: ${{ steps.fetch.outputs.bucket }}
      site_url: ${{ steps.fetch.outputs.site_url }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_FE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets and backend URL
        id: fetch
        run: |
          API_BASE_URL=$(gcloud run services describe padel-api \
            --region=europe-west2 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          BUCKET=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEB_PLAYER_BUCKET \
            --project=${{ secrets.GCP_PROJECT_ID }})
          SITE_URL=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEB_PLAYER_SITE_URL \
            --project=${{ secrets.GCP_PROJECT_ID }})
          echo "api_base_url=$API_BASE_URL" >> $GITHUB_OUTPUT
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm --filter @repo/web-player lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: frontend
        run: pnpm --filter @repo/web-player test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secrets, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ needs.secrets.outputs.api_base_url }}
          VITE_APP_ENV: ${{ env.DEPLOY_ENV }}
        run: pnpm --filter @repo/web-player build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-player-dist
          path: frontend/apps/web-player/dist
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [secrets, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-player-dist
          path: dist

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_FE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set version tag
        id: version
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload versioned build
        run: |
          gsutil -m rsync -r dist/ "gs://${{ needs.secrets.outputs.bucket }}/${{ steps.version.outputs.tag }}/"

      - name: Promote to active (bucket root)
        run: |
          gsutil -m cp -r dist/. "gs://${{ needs.secrets.outputs.bucket }}/"

      - name: Set cache headers
        run: |
          gsutil -m setmeta -h "Cache-Control:public,max-age=31536000,immutable" \
            "gs://${{ needs.secrets.outputs.bucket }}/assets/**"
          gsutil setmeta -h "Cache-Control:no-cache,no-store,must-revalidate" \
            "gs://${{ needs.secrets.outputs.bucket }}/index.html"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [secrets, deploy]
    steps:
      - name: Smoke test site root
        env:
          SITE_URL: ${{ needs.secrets.outputs.site_url }}
        run: |
          for attempt in {1..10}; do
            status=$(curl -sSL -o response.html -w "%{http_code}" "$SITE_URL")
            if [ "$status" = "200" ] && grep -iq '<!doctype html' response.html; then
              echo "Smoke test passed for $SITE_URL"
              exit 0
            fi
            echo "Attempt $attempt failed (HTTP $status)"
            sleep 10
          done
          echo "Smoke test failed for $SITE_URL"
          exit 1
