name: Deploy website

on:
  push:
    branches:
      - frontend
    paths:
      - frontend/apps/website/**
      - .github/workflows/deploy-frontend-website.yml
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  DEPLOY_ENV: ${{ github.event.inputs.deploy_env || 'production' }}

jobs:
  secrets:
    name: Fetch Secrets from GCP
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.fetch.outputs.bucket }}
      site_url: ${{ steps.fetch.outputs.site_url }}
      player_site_url: ${{ steps.fetch.outputs.player_site_url }}
      staff_site_url: ${{ steps.fetch.outputs.staff_site_url }}
      cf_zone_id: ${{ steps.fetch.outputs.cf_zone_id }}
      cf_api_token: ${{ steps.fetch.outputs.cf_api_token }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_FE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets
        id: fetch
        run: |
          BUCKET=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEBSITE_BUCKET \
            --project=${{ secrets.GCP_PROJECT_ID }})
          SITE_URL=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEBSITE_SITE_URL \
            --project=${{ secrets.GCP_PROJECT_ID }})
          PLAYER_SITE_URL=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEB_PLAYER_SITE_URL \
            --project=${{ secrets.GCP_PROJECT_ID }})
          STAFF_SITE_URL=$(gcloud secrets versions access latest \
            --secret=FRONTEND_WEB_STAFF_SITE_URL \
            --project=${{ secrets.GCP_PROJECT_ID }})
          CF_ZONE_ID=$(gcloud secrets versions access latest \
            --secret=CF_ZONE_ID \
            --project=${{ secrets.GCP_PROJECT_ID }})
          CF_API_TOKEN=$(gcloud secrets versions access latest \
            --secret=CF_API_TOKEN \
            --project=${{ secrets.GCP_PROJECT_ID }})
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT
          echo "player_site_url=$PLAYER_SITE_URL" >> $GITHUB_OUTPUT
          echo "staff_site_url=$STAFF_SITE_URL" >> $GITHUB_OUTPUT
          echo "cf_zone_id=$CF_ZONE_ID" >> $GITHUB_OUTPUT
          echo "cf_api_token=$CF_API_TOKEN" >> $GITHUB_OUTPUT

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          VITE_APP_ENV: ${{ env.DEPLOY_ENV }}
          VITE_API_PLAYER_SITE_URL: ${{ needs.secrets.outputs.player_site_url }}
          VITE_API_STAFF_SITE_URL: ${{ needs.secrets.outputs.staff_site_url }}
        run: pnpm --filter @repo/website build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: frontend/apps/website/dist
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [secrets, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: dist

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_FE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set version tag
        id: version
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload versioned build
        run: |
          gsutil -m rsync -r dist/ "gs://${{ needs.secrets.outputs.bucket }}/${{ steps.version.outputs.tag }}/"

      - name: Promote to active (bucket root)
        run: |
          gsutil -m cp -r dist/. "gs://${{ needs.secrets.outputs.bucket }}/"

      - name: Set cache headers
        run: |
          gsutil -m setmeta -h "Cache-Control:public,max-age=31536000,immutable" \
            "gs://${{ needs.secrets.outputs.bucket }}/assets/**"
          gsutil setmeta -h "Cache-Control:no-cache,no-store,must-revalidate" \
            "gs://${{ needs.secrets.outputs.bucket }}/index.html"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ needs.secrets.outputs.cf_zone_id }}/purge_cache" \
            -H "Authorization: Bearer ${{ needs.secrets.outputs.cf_api_token }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' \
            && echo "Cloudflare cache purged." \
            || { echo "ERROR: Cloudflare cache purge failed"; exit 1; }

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [secrets, deploy]
    steps:
      - name: Smoke test site root
        env:
          SITE_URL: ${{ needs.secrets.outputs.site_url }}
        run: |
          for attempt in {1..10}; do
            status=$(curl -sSL -o response.html -w "%{http_code}" "$SITE_URL")
            if [ "$status" = "200" ] && grep -iq '<!doctype html' response.html; then
              echo "Smoke test passed for $SITE_URL"
              exit 0
            fi
            echo "Attempt $attempt failed (HTTP $status)"
            sleep 10
          done
          echo "Smoke test failed for $SITE_URL"
          exit 1
